name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, Lint, Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Validate the engines.node lower bound (20.19) and current LTS / latest
        node: [ 20.19, 22, 24 ]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Typecheck, lint and build cover only the packages. The apps
      # (landing/docs/story) use Astro/Vite/Vocs that need Node 22+ (astro
      # check, CustomEvent, fs.globSync), so they are not part of this
      # Node-matrix validation of the publishable packages.
      - run: pnpm --filter './packages/**' typecheck

      - run: pnpm --filter './packages/**' lint

      - run: pnpm --filter './packages/**' build

      - run: pnpm test
