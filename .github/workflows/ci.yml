name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, Lint, Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Validate the engines.node lower bound (18.17) and current LTS / latest
        node: [ 18.17, 20, 22, 24 ]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      # Build only packages, not apps. Apps (docs/story) use Vite/Vocs that
      # require Node 22+ (CustomEvent, fs.globSync); the packages we ship to
      # npm support engines.node >=18.17 and that is what we validate here.
      - run: pnpm --filter './packages/**' build

      - run: pnpm test
