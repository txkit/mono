name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish-tx-protocol:
    name: Publish @txkit/tx-protocol
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @txkit/tx-protocol typecheck

      - run: pnpm --filter @txkit/tx-protocol test

      - run: pnpm --filter @txkit/tx-protocol build

      - name: Publish @txkit/tx-protocol
        # NOTE: --provenance is intentionally disabled until the
        # repository becomes public (npm provenance rejects private
        # GitHub source repos). When we publish 0.1.0, re-add --provenance
        # and drop the --tag flag so it goes to `latest`.
        run: pnpm --filter @txkit/tx-protocol publish --no-git-checks --access public --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
