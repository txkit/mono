[profile.default]
src = 'src'
out = 'out'
libs = [ 'lib' ]
test = 'test'
script = 'script'
cache_path = 'cache'

solc = '0.8.28'
optimizer = true
optimizer_runs = 200
via_ir = false

# Required for verification on Arbiscan + Robinhood Chain explorer
bytecode_hash = 'none'
cbor_metadata = false

remappings = [
    '@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/',
    'forge-std/=lib/forge-std/src/',
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = 'long'
quote_style = 'double'
number_underscore = 'thousands'

[rpc_endpoints]
arbitrum_sepolia = '${ARB_SEPOLIA_RPC_URL}'
robinhood_testnet = '${ROBINHOOD_TESTNET_RPC_URL}'

[etherscan]
arbitrum_sepolia = { key = '${ARBISCAN_API_KEY}', url = 'https://api-sepolia.arbiscan.io/api' }
# Robinhood Chain testnet explorer verification config to be added when API published
