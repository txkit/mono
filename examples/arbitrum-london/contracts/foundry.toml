[profile.default]
src = 'src'
out = 'out'
libs = [ 'lib' ]
test = 'test'
script = 'script'
cache_path = 'cache'

solc = '0.8.34'
# Pin cancun explicitly: solc's default evm_version can advance past it (e.g. prague),
# and Arbitrum / Arbitrum-Orbit (Robinhood) target cancun. 0.8.34 clears the generic
# 0.8.28 Arbiscan compiler-bug notices (TransientStorageClearingHelperCollision,
# LostStorageArrayWriteOnSlotOverflow) - neither applied here (no transient storage,
# no storage arrays, via_ir off), but a clean explorer page is better for reviewers.
evm_version = 'cancun'
optimizer = true
optimizer_runs = 200
via_ir = false

# Required for verification on Arbiscan + Robinhood Chain explorer
bytecode_hash = 'none'
cbor_metadata = false

remappings = [
    '@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/',
    'forge-std/=lib/forge-std/src/',
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = 'long'
quote_style = 'double'
number_underscore = 'thousands'

[rpc_endpoints]
arbitrum_sepolia = '${ARB_SEPOLIA_RPC_URL}'
robinhood_testnet = '${ROBINHOOD_TESTNET_RPC_URL}'

[etherscan]
# Etherscan API V2 unified endpoint (one key across chains, chainid resolved from --chain).
# The legacy per-chain V1 url (api-sepolia.arbiscan.io/api) was deprecated in the 2025 V2 migration.
arbitrum_sepolia = { key = '${ARBISCAN_API_KEY}' }
# Robinhood Chain testnet explorer verification config to be added when API published
